<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlassConvert | Document Automation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="glass-container p-10 rounded-3xl shadow-2xl max-w-2xl w-full text-center border border-white/20">
        <h1 class="text-3xl font-bold text-white mb-2">GlassConvert</h1>
        <p class="text-white/70 mb-8">Professional Excel & PDF Conversion</p>

        <div class="flex justify-center gap-4 mb-8">
            <button id="btnXlsToPdf" class="toggle-btn active">Excel to PDF</button>
            <button id="btnPdfToXls" class="toggle-btn">PDF to Excel</button>
        </div>

        <div id="drop-zone" class="border-2 border-dashed border-white/30 rounded-2xl py-12 px-6 transition-all hover:border-white/60 cursor-pointer mb-6">
            <input type="file" id="fileInput" class="hidden">
            <div class="text-white">
                <span class="text-4xl">📄</span>
                <p id="file-label" class="mt-4 font-medium">Drag & drop or click to upload</p>
            </div>
        </div>

        <button id="convertBtn" class="w-full py-4 bg-white/20 hover:bg-white/30 text-white font-semibold rounded-xl transition-all border border-white/10 hidden">
            Generate Document
        </button>

        <div id="status" class="mt-4 text-sm text-white/60">Initializing Python Runtime...</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
